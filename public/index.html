
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Notes App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <h1>My Notes</h1>
</header>

<div class="container">

    <div class="card add-card">
        <h2>Add Note</h2>
        <input type="text" id="noteInput" placeholder="Write a note...">
        <button id="addBtn" class="form-button">Add Note</button>
    </div>

    <div class="card">
        <h2>Your Notes</h2>
        <ul id="noteList" class="task-list"></ul>
    </div>

</div>

<footer>
    <p>&copy; 2026 Notes App. All rights reserved.</p>
</footer>

<script src="script.js"></script>

</body>
</html>
